---
name: Links

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  links:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    timeout-minutes: 2
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/links@a3d1207b08d8948851088b1f60c746aa2aa885f9 # v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
