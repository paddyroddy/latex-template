---
name: Deploy

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

concurrency:
  cancel-in-progress: true
  group: >-
    ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  chktex:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/latex/chktex@d7ef1ce76b6d02d7e81fe9bb3c22885c6376f986 # v0

  vale:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-slim
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/vale@d7ef1ce76b6d02d7e81fe9bb3c22885c6376f986 # v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  compile-latex:
    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/latex/compile@d7ef1ce76b6d02d7e81fe9bb3c22885c6376f986 # v0

      - name: Upload artefacts
        # yamllint disable-line rule:line-length
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: artefacts
          path: "*.pdf"
          if-no-files-found: error

  upload-to-dropbox:
    if: github.ref == 'refs/heads/main'
    needs: compile-latex
    permissions:
      contents: read
    runs-on: ubuntu-slim
    steps:
      - name: Download artefacts
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: artefacts

      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/dropbox@d7ef1ce76b6d02d7e81fe9bb3c22885c6376f986 # v0
        env:
          CONFIGFILE_VERSION: ${{ secrets.CONFIGFILE_VERSION }}
          OAUTH_APP_KEY: ${{ secrets.OAUTH_APP_KEY }}
          OAUTH_APP_SECRET: ${{ secrets.OAUTH_APP_SECRET }}
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
        with:
          configfile-version: ${{ env.CONFIGFILE_VERSION }}
          files-to-upload: $(find . -maxdepth 1 -name '*.pdf' -print)
          oauth-app-key: ${{ env.OAUTH_APP_KEY }}
          oauth-app-secret: ${{ env.OAUTH_APP_SECRET }}
          oauth-refresh-token: ${{ env.OAUTH_REFRESH_TOKEN }}
