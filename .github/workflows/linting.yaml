---
name: Linting

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  linting:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/linting@a3d1207b08d8948851088b1f60c746aa2aa885f9 # v0
        with:
          pre-commit-config: ./.pre-commit-config.yaml
